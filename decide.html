<title>Decide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0ede8;
    --text2: rgba(240,237,232,0.5);
    --accent: #e8d5a3;
    --accent-dark: #c4a96a;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    overscroll-behavior: none;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
    max-width: 430px;
    margin: 0 auto;
    padding: env(safe-area-inset-top, 16px) 0 env(safe-area-inset-bottom, 16px);
  }

  header {
    padding: 20px 24px 12px;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  header span {
    font-size: 13px;
    color: var(--text2);
    font-weight: 300;
  }

  .tabs {
    display: flex;
    margin: 0 24px 20px;
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 3px;
    gap: 2px;
  }

  .tab {
    flex: 1;
    padding: 9px 4px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--text2);
    border-radius: 7px;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .tab.active {
    background: var(--accent);
    color: #1a1400;
  }

  .content {
    flex: 1;
    padding: 0 24px;
    overflow-y: auto;
  }

  .section { display: none; }
  .section.active { display: block; }

  .field-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 8px;
    margin-top: 18px;
  }

  .field-label:first-child { margin-top: 0; }

  input[type=text] {
    width: 100%;
    padding: 13px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 400;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }

  input[type=text]:focus {
    border-color: var(--border2);
  }

  input[type=text]::placeholder {
    color: var(--text2);
  }

  .btn-primary {
    width: 100%;
    padding: 15px;
    margin-top: 20px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    border: none;
    border-radius: var(--radius-sm);
    background: var(--accent);
    color: #1a1400;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-primary:active { transform: scale(0.97); opacity: 0.9; }

  .btn-secondary {
    flex: 1;
    padding: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.3px;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-secondary:active { background: var(--surface2); }

  .result-card {
    margin-top: 20px;
    padding: 28px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    text-align: center;
    display: none;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-emoji {
    font-size: 48px;
    display: block;
    margin-bottom: 12px;
  }

  .result-eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 8px;
  }

  .result-main {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.5px;
    line-height: 1.2;
    word-break: break-word;
  }

  .result-note {
    font-size: 13px;
    color: var(--text2);
    margin-top: 8px;
  }

  .list-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .list-row input { margin: 0; }

  .remove-btn {
    width: 40px;
    height: 40px;
    flex-shrink: 0;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--text2);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    line-height: 1;
    padding-bottom: 1px;
  }

  .remove-btn:active { background: var(--surface2); color: var(--text); }

  .add-row {
    width: 100%;
    padding: 12px;
    margin-bottom: 4px;
    border: 1px dashed var(--border2);
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .add-row:active { background: var(--surface); }

  .vote-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    margin-bottom: 10px;
    transition: border-color 0.15s;
  }

  .vote-item.voting {
    cursor: pointer;
    -webkit-user-select: none;
  }

  .vote-item.voting:active {
    border-color: var(--accent-dark);
    background: var(--surface2);
  }

  .vote-name {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
  }

  .vote-meta {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .vote-bar-wrap {
    flex: 1;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .vote-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }

  .vote-tally {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text2);
    min-width: 52px;
    text-align: right;
  }

  .vote-tap-hint {
    font-size: 12px;
    color: var(--text2);
    text-align: center;
    margin-bottom: 14px;
    letter-spacing: 0.3px;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }

  .winner-bar {
    background: linear-gradient(90deg, rgba(232,213,163,0.15), transparent);
    border-color: rgba(232,213,163,0.25) !important;
  }

  .winner-bar .vote-name {
    color: var(--accent);
  }

  .spin {
    display: inline-block;
    animation: spinY 0.5s ease-out;
  }

  @keyframes spinY {
    0% { transform: rotateY(0deg) scale(0.8); }
    50% { transform: rotateY(180deg) scale(1.2); }
    100% { transform: rotateY(360deg) scale(1); }
  }

  .shuffle {
    animation: pulse 0.08s ease;
  }

  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Decide</h1>
    <span>make up your mind</span>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('coin')">🪙 Flip</button>
    <button class="tab" onclick="switchTab('pick')">🎲 Pick</button>
    <button class="tab" onclick="switchTab('vote')">📊 Vote</button>
  </div>

  <div class="content">

    <!-- COIN FLIP -->
    <div id="coin" class="section active">
      <div class="field-label">Option A</div>
      <input type="text" id="opt-a" placeholder="e.g. Stay in" autocomplete="off">
      <div class="field-label">Option B</div>
      <input type="text" id="opt-b" placeholder="e.g. Go out" autocomplete="off">
      <button class="btn-primary" onclick="flipCoin()">Flip the coin</button>
      <div class="result-card" id="coin-result">
        <span class="result-emoji" id="coin-emoji">🪙</span>
        <div class="result-eyebrow">The coin chose</div>
        <div class="result-main" id="coin-winner"></div>
        <div class="result-note" id="coin-note"></div>
      </div>
    </div>

    <!-- RANDOM PICK -->
    <div id="pick" class="section">
      <div class="field-label">Your options</div>
      <div id="pick-list"></div>
      <button class="add-row" onclick="addPickItem()">+ Add option</button>
      <button class="btn-primary" onclick="pickRandom()">Pick one randomly</button>
      <div class="result-card" id="pick-result">
        <span class="result-emoji">🎯</span>
        <div class="result-eyebrow">Go with</div>
        <div class="result-main" id="pick-winner"></div>
      </div>
    </div>

    <!-- GROUP VOTE -->
    <div id="vote" class="section">
      <div id="vote-setup-view">
        <div class="field-label">Options to vote on</div>
        <div id="vote-setup-list"></div>
        <button class="add-row" onclick="addVoteItem()">+ Add option</button>
        <button class="btn-primary" onclick="startVoting()">Start voting</button>
      </div>
      <div id="vote-active-view" style="display:none">
        <div class="vote-tap-hint">Tap an option to add a vote</div>
        <div id="vote-tally-list"></div>
        <div class="btn-row">
          <button class="btn-secondary" onclick="resetVotes()">Reset votes</button>
          <button class="btn-secondary" onclick="endVoting()">Edit options</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  // --- TAB SWITCHING ---
  function switchTab(t) {
    document.querySelectorAll('.tab').forEach((el,i) => el.classList.remove('active'));
    document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
    const map = ['coin','pick','vote'];
    document.querySelectorAll('.tab')[map.indexOf(t)].classList.add('active');
    document.getElementById(t).classList.add('active');
  }

  // --- COIN FLIP ---
  function flipCoin() {
    const a = document.getElementById('opt-a').value.trim() || 'Option A';
    const b = document.getElementById('opt-b').value.trim() || 'Option B';
    const resultEl = document.getElementById('coin-result');
    const emojiEl = document.getElementById('coin-emoji');
    const winnerEl = document.getElementById('coin-winner');
    const noteEl = document.getElementById('coin-note');

    resultEl.style.display = 'block';
    emojiEl.className = 'result-emoji spin';
    winnerEl.textContent = '...';
    noteEl.textContent = '';

    setTimeout(() => {
      emojiEl.className = 'result-emoji';
      const winner = Math.random() < 0.5 ? a : b;
      const loser = winner === a ? b : a;
      winnerEl.textContent = winner;
      noteEl.textContent = loser + ' will have to wait.';
    }, 500);
  }

  // --- RANDOM PICK ---
  let pickItems = [];

  function renderPickList() {
    const el = document.getElementById('pick-list');
    el.innerHTML = '';
    pickItems.forEach((v, i) => {
      const row = document.createElement('div');
      row.className = 'list-row';
      row.innerHTML = `
        <input type="text" value="${v}" placeholder="Option ${i+1}" autocomplete="off"
          oninput="pickItems[${i}]=this.value">
        <button class="remove-btn" onclick="removePickItem(${i})">×</button>
      `;
      el.appendChild(row);
    });
  }

  function addPickItem() { pickItems.push(''); renderPickList(); }
  function removePickItem(i) { pickItems.splice(i,1); renderPickList(); }

  function getPickValues() {
    return Array.from(document.querySelectorAll('#pick-list input'))
      .map(inp => inp.value.trim()).filter(v => v);
  }

  function pickRandom() {
    const vals = getPickValues();
    if (vals.length < 2) { alert('Add at least 2 options!'); return; }
    const resultEl = document.getElementById('pick-result');
    const winnerEl = document.getElementById('pick-winner');
    resultEl.style.display = 'block';
    let count = 0;
    const total = 14;
    const interval = setInterval(() => {
      winnerEl.textContent = vals[Math.floor(Math.random() * vals.length)];
      winnerEl.classList.add('shuffle');
      setTimeout(() => winnerEl.classList.remove('shuffle'), 80);
      count++;
      if (count >= total) {
        clearInterval(interval);
        winnerEl.textContent = vals[Math.floor(Math.random() * vals.length)];
      }
    }, 70);
  }

  // --- VOTE ---
  let voteItems = [];
  let votes = [];

  function renderVoteSetup() {
    const el = document.getElementById('vote-setup-list');
    el.innerHTML = '';
    voteItems.forEach((v, i) => {
      const row = document.createElement('div');
      row.className = 'list-row';
      row.innerHTML = `
        <input type="text" value="${v}" placeholder="Option ${i+1}" autocomplete="off"
          oninput="voteItems[${i}]=this.value">
        <button class="remove-btn" onclick="removeVoteItem(${i})">×</button>
      `;
      el.appendChild(row);
    });
  }

  function addVoteItem() { voteItems.push(''); renderVoteSetup(); }
  function removeVoteItem(i) { voteItems.splice(i,1); renderVoteSetup(); }

  function startVoting() {
    const vals = Array.from(document.querySelectorAll('#vote-setup-list input'))
      .map(inp => inp.value.trim()).filter(v => v);
    if (vals.length < 2) { alert('Add at least 2 options!'); return; }
    voteItems = vals;
    votes = vals.map(() => 0);
    document.getElementById('vote-setup-view').style.display = 'none';
    document.getElementById('vote-active-view').style.display = 'block';
    renderTally();
  }

  function renderTally() {
    const el = document.getElementById('vote-tally-list');
    const total = votes.reduce((a,b) => a+b, 0) || 1;
    const maxVotes = Math.max(...votes);
    el.innerHTML = '';
    voteItems.forEach((v, i) => {
      const pct = Math.round(votes[i] / total * 100);
      const isLeader = votes[i] > 0 && votes[i] === maxVotes;
      const item = document.createElement('div');
      item.className = 'vote-item voting' + (isLeader ? ' winner-bar' : '');
      item.onclick = () => { votes[i]++; renderTally(); };
      item.innerHTML = `
        <div class="vote-name">${v}</div>
        <div class="vote-meta">
          <div class="vote-bar-wrap">
            <div class="vote-bar" style="width:${pct}%"></div>
          </div>
          <div class="vote-tally">${votes[i]} vote${votes[i]!==1?'s':''}</div>
        </div>
      `;
      el.appendChild(item);
    });
  }

  function resetVotes() { votes = votes.map(() => 0); renderTally(); }

  function endVoting() {
    document.getElementById('vote-setup-view').style.display = 'block';
    document.getElementById('vote-active-view').style.display = 'none';
    renderVoteSetup();
  }

  // --- INIT ---
  pickItems = ['', '', ''];
  renderPickList();
  voteItems = ['', '', ''];
  renderVoteSetup();
</script>
</body>
</html>
